body:
  text: 燕翼詒謀録卷五宋王栐撰仁宗時有染工自南方來以山礬葉燒灰染紫以為黝獻之宦者洎諸王無不愛之乃用為朝袍乍見者皆駭觀士大夫雖慕之不敢為也而婦女有以為衫褑者言者亟論之以為竒邪之服寖不可長至和七年十月己丑詔嚴為之禁犯者罪之中興以後駐蹕南方貴賤皆衣黝紫反以赤紫為御愛紫亦無敢以為衫袍者獨婦人以為衫褑爾服紫始末巳見前卷真宗時試進士初用糊名法以革容私之弊張士遜以監察御史為巡捕官因白主司有親戚在進士明日當引試願出以避嫌主司不聽士遜乃自言引去真宗是之遂詔自今舉人與試官有親嫌者移試别頭别試所自此始且以御史為巡捕決無容私矣易以宦官不知始於何年也唐設武舉以選將帥五代以來皆以軍卒為將此制久廢天聖七年以西邊用兵將帥乏人復置武舉至皇祐元年邊事寖息遂廢此科治平元年九月丁卯復置迄於今不廢淳熙甲辰距治平百二十載矣仲父軒山公知貢舉武舉林㟽陶天麟等來拜謝仲父問之曰朝廷設此科以擇將帥而公等不從軍何也答以不堪笞箠之辱仲父因奏孝宗皇帝乞更舊制申飭三衙沿江軍帥待以士禮至淳熙十四年事始施行進士皆願從軍至紹熙庚戌仲父以知樞密院兼參知政事唱進士第復奏光宗皇帝命武舉進士從軍不許軍帥笞辱大罪按奏小罪罰俸此令一出皆願從軍而軍中無所容之乃自三衙立同正員之額以至江上諸軍每舉以二十四員為額七年為任第一名同正將第二名第三名同副將第四名以下同準備將而第二十五名以下只注巡尉自後軍帥亦仰承朝廷優恤之意待遇之禮與統領官等或令其兼同統領職事遇出戰多守令寨必自願親行陳者始聽之並軍中自統制以下多是假攝或以準備將而權統制者每於文移公牘書劄榜子削其本職為寫權職而正遇東班便自居通判之上唯知凶暴陵駕士大夫一聞鉦鼓之聲則惴惴戰栗士大夫信其僞銜不復與較故以守闕進勇副尉為統制者往往而是若於武舉中選願親行陳者使久於其任而序進之必趨事赴功矣部吏賣闕之弊自昔有之皇祐中趙及判流內銓始置闕亭凡有州郡申到闕即時榜出以防賣闕立法非不善也然部吏每遇申到匿而不告今州郡寄居有丁憂事故數年不申到者亦有申部數年而部中不曽改正榜示者吏人公然評價長二郎官為小官時皆嘗由之亦不暇問太宗皇帝曰幸門如鼠穴不可塞也豈不信哉國初宦者不過數十人真宗時漸衆蓋以遇郊恩任子皆十數嵗小兒積纍至多故也皇祐五年閏七月戊戌言者以為久弊當革乃詔自供奉官至黃門以百八十員為額遇闕額方許奏補至元祐二年二月又詔自供奉官至黃門以百人為額然流弊之久終不能革至宣政間動以千數矣仁宗朝言者以士大夫不安職守惟務奔競乞申嚴戒勵慶厯八年五月丁卯詔中外官滿二年方許差替其三年三十月為任者仍舊此誠良法也中興以來職事官猶計資考故有須次一兩政者至於三丞以上至於郎官卿監有三四年不遷者故人無苟且之心近年滿年不遷則為人指目居其位亦恐懼求去是不諳祖宗典故爾舊制御試詩賦論士人未免上請於殿陛之下出題官臨軒答之往復紛紜殊失尊嚴之體景祐元年三月丙子詔進士題具書史所出御藥院印給士人不許上請自後進士各伏其位不敢復至殿庭國朝待遇士大夫甚厚皆前代所無天聖五年詔臣僚薨卒當賜諡而本家不陳乞者令有司舉行又兄弟同在朝者令連狀封贈此推恩泉壤澤及幽冥也九年十二月癸丑詔流內銓選人父母年八十以上權聽注近官此教人以孝且厚風俗也康定元年六月壬子詔臣僚之官罷任所過山險去處差軍士防送無過送迎人之半此閔其道路羇旅恐不得其所也仁宗施恩於臣下者如此可謂仁矣先是咸平六年真宗詔命官遷謫嶺南亡殁者並許歸葬官給緡錢如親屬年幼差牙校部送至其家蓋其人雖犯罪而其死則可閔威以懲其罪恩以恤其死施於死者猶爾况生者乎施於有罪者猶爾况無罪者乎仁宗可謂能𢎞家法矣宗室年五嵗則官為廩給此祖宗舊法也皇祐二年判大宗正事允讓請自三嵗廩給仁宗以太過三月甲辰詔宗室三嵗以上官為給食今又復以五嵗為限矣西京學校舊為河南府學景祐元年詔改為西京國子監以為優賢之所商稅之任今付之初官小使臣或流外校尉副尉州郡縣令亦鄙賤之曽不思客旅往來鄉民入市動遭竭澤又復營私掩為已有害民有甚焉者真宗景德二年三月癸未詔商稅三萬貫以上選親民官監給通判添支所以重譏征之寄近時理親民資序為監當者未之聞也往往以為浼已不肯䙝就矣然朝廷以場務之寄責之長二縣令知監當之難於其人也故康定元年六月壬子詔天下州縣課利場務十分虧五釐以下知通縣令罰俸一月一分以下兩月二分降差遣增二分升陟差遣賞罰不及於監當有深㫖矣大中祥符四年十二月已未越州言㑹稽縣民裘承詢同居十九世家無異爨詔旌表其門閭屈指今二百三十六年矣其號義門如故也余嘗至其村故聽事猶在族人雖異居同在一村中世推一人為長有事取決則坐於聽事有竹簟亦世相授矣族長欲撻有罪者則用之嵗時㑹拜同飲咸在至今免役不知十九世而下今又幾世也余嘗思之裘氏力農無為士大夫者所以能久聚而不散苟有驟貴超顯之人則有非族長所能令者况貴賤殊塗炎涼異趣父兄雖守之子孫亦將變之義者將為不義矣裘氏雖無顯者子孫世守其業猶為大族勝於乍盛乍衰者多矣天之祐裘氏者豈不甚厚乎國初進士詞賦押韻不拘平仄次序太平興國三年九月始詔進士律賦平仄次第用韻而考官所出官韻必用四平四仄詞賦自此整齊讀之鏗鏘可聽矣司天監官自挈壺正轉保章正靈臺郎直長局丞至冬官正僅五遷爾舊制五年一轉或謂較之武臣洎醫官則太優欲增其等級慶厯五年六月乙卯朔詔自保章正至五官正十年一遷官雖循轉甚遲然比承信郎轉至武翼郎猶為優矣承平時溫州鼎州廣州皆貢柑子尚方多不過千少或百數其後州郡苞苴權要負擔者絡繹又以易腐多其數以備揀擇重為人害天聖六年四月庚戌詔三州不得以貢餘為名餉遺近臣犯者有罰然終不能禁也今惟溫有嵗貢嵗饋鼎廣不復有之矣五季日尋干戈其於軍卒尤先激勵凡軍頭非有戰功皆號伴飯指揮使皇朝一統邊境無虞伴飯者衆乃詔以處有罪者凡為此職人皆望而知其犯罪也大中祥符二年二月詔改軍頭伴飯指揮使為散指揮使然自此人不復以為恥而激勵之權微矣皇朝初下江南置水路陸路發運二使運江南之粟以贍京師其後以陸路不便悉從水路雍熙四年四月已亥詔令水路陸路發運為一路以王繼升掌之董儼為同掌自此迄於宣和不改國初進士期集以甲次髙下率錢刋小録事遊燕或冨而名次卑所出無幾或貧而名次髙至於假丐熙寧六年三月庚申詔賜進士及第錢三千緡諸科七百緡為期集費一時歆豔以為盛事次舉熙寧九年三月戊寅練亨甫奏罷期集錢止賜錢造小録及第五百千諸科二百千而遊燕之費復率錢為之至元祐三年三月甲戌詔復增進士錢百萬酒五百壺為期集費相仍至今定為千七百緡而局中凡所率錢皆以小録為名而同年得與燕集者無幾又為職事者日叨飲食所得小録題名紙札裝潢皆精緻不費一金其不與職事者出錢而所得絶不佳不沾杯勺無乃太不均乎元豐四年二月乙卯詔東南團練諸軍為十三將蓋太祖皇帝初下江南慮人心未一分禁旅以戍之嵗月寖久與州郡之兵無别故也淮東第一淮西第二浙西第三浙東第四江東第五江西第六湖北第七湖南第八全邵永第九準備廣州應援福建第十廣東第十一桂州今靜江府第十二雍州第十三廩給特厚與禁衛比若江上諸軍乃諸郡兵額因勤王入援失其土地故以駐劄名之其廩給與將兵不同况州郡之兵乎僧道度牒每嵗試補刋印板用紙摹印新法既行獻議者立價出賣每牒一紙為價百三十千然猶嵗立為定額不得過數熙寧元年七月始出賣於民間初嵗不過三四千人至元豐六年限以萬數而䕫州轉運司增價至三百千以次減為百九十千建中靖國元年增至二百二十千大觀四年嵗賣三萬餘紙新舊積壓民間折價至九十千朝廷病其濫住賣三年仍追在京民間者毁抹諸路民間聞之一時爭折價急售至二十千一紙而冨家停榻漸增至百餘貫有司以聞遂詔已降度牒量增價直别給公據以俟書填六年又詔改用綾紙依將仕郎校尉例宣和七年以天下僧道踰百萬數遂詔住給五年繼更兵火廢格不行南渡以後再立新法度牒自六十千增至百千淳熙初增至三百千又增為五百千又增為七百千然朝廷謹重愛惜不輕出賣往往持錢入行都多方經營而後得之後又著為停榻之令許客人增百千興販又增作八百千近嵗給降轉多州郡至減價以求售也至和元年二月乙未因大雨雪詔天下長吏詳酌公私房錢與放三日非遇大雨雪不許蠲放仍每嵗不得過三次是時天下承平百餘年矣仁宗皇帝凝神穆清而念慮及於細微真聖主也國初凡事草創學校教養未甚加意皇祐三年七月壬子詔太學生舊制二百人如不足止百人為限其簡如此元豐二年十二月乙巳神宗始命畢仲衍蔡京范鏜張璪詳定於太學創八十齊三十人為額通計二千四百人內上舍生百人內舍生三百人外舍生二千人崇寧元年徽宗創立辟雍增生徒共三千八百人內上舍生二百人內舍生六百人教養於太學外舍生三千人教養於辟雍廢太學自訟齊太學之不率教者移之辟雍以祭酒總治兩學辟雍别置司業丞各一人博士十人正録各五人分為百齊講堂凡四所其後王黼反蔡京之政奏廢之而辟雍之士太學無所容矣自江南既平兩浙福建納土之後諸州直𨽻京師無復藩府惟河北河東陜西以捍禦西北二邊帥臣之權特重其他諸路責任監司按察而已嘉祐四年五月丁已始詔揚廬江寧洪潭越福七路兼本路軍馬鈐轄各置禁軍駐泊三指揮越福二指揮以威果為額每指揮四百人各路兵馬都等一員越福一員其後二廣經略京東西路安撫江東西路安撫皆因事令守臣兼領而加以鈐轄之名以至兩浙四川皆以調發之故後又改鈐轄為總管而四川至今仍舊名開端於嘉祐之時而定制於中興之後然帥臣大抵權輕當緩急之時罕能成功承平無事惟事教閲而已矧自勤王諸將分為駐劄州郡之額闕不復補名存實亡然人存政舉苟擇人而用之仍委以久任庶幾緩急有所恃也舊制殿試皆有黜落臨時取㫖或三人取一或二人取一或三人取二故有纍經省試取中屢擯棄於殿試者故張元以積忿降元昊大為中國之患朝廷始囚其家屬未幾復縱之於是羣臣建議歸咎於殿試黜落嘉祐二年三月辛巳詔進士與殿試者皆不黜落迄今不改是一叛逆之賊子為天下後世士子無窮之利也通判舉人改官與太守同自提舉常平使者列於監司諸路頓增員數熙寧元年十二月始詔通判不得舉人改京官元豐初詔改官人五日引一甲一甲三人嵗以百四十人為額至元祐元年四月罷諸路提舉常平再命通判嵗終舉改官一人或縣令一人間舉十二月以改官員多吏部侍郎孫覺請嵗以百人為額從之紹聖三年吏部乞以每甲五人引見不拘數則是嵗有三百餘員也中興以來改官人數絶少嵗不過數十人雖令選人舉官逐員放散數亦不增至紹熙初號為頓增亦僅三十餘員慶元以後嵗有溢額蓋孤寒路絶得舉官五員俱足而不得者多不破白勢使然也納粟補官始以拯饑後以募民實粟於邊自王安石開邊國用不足而致粟於邊頗艱應募者寡元祐二年八月詔進納人許其改官厯四任十考增舉主二員職司二常員五自此人樂於應募此法雖明未聞有改秩者或謂中興以後有一人官至太守忘其姓名舊制監司太守舉京官有定數縣令初不限員數皇祐二年五月庚午京西提㸃刑獄張易舉十六人縣令乃詔河北陜西漕舉十二員憲六員河東京東西淮南漕十員憲五員兩浙江東西福建湖南北廣東西益利梓路漕憲各四員䕫路漕四員憲二員六路制置發運使副六員開封府諸州軍各一員然立法之初舉縣令有出身三考無出身四考有舉主二人移注近縣令任滿無贓私升募職再任知縣再任滿引對改京官則是受舉之後厯知縣兩任六考改官此天聖七年閏二月甲辰詔書也至熙寧四年詔再任知縣縣令人須有安撫轉運提刑知州通判奏舉五員方許再任內有職司二人者亦聽此乃就任改官也政和間又以州縣增官員復增舉員中興以來一循前例然亦時有增損舊制特遷官者其理磨勘並自受告日為始故有垂當磨勘忽拜特恩前功俱廢熙寧六年八月丙申詔文武臣僚特遷官者不隔磨勘施恩甚均人䝉實惠至今仍之景祐三年五月詔中外臣僚許以家書附遞明告中外下進奏院依應施行蓋臣子逺宦孰無墳墓宗族親戚之念其能専人馳書必達官貴人而後可此制一頒則小官下位受賜者多今所在士大夫私書多入遞者循舊制也國初因唐制取士只用詞賦其解釋諸經者名曰明經不得與進士齒王安石罷去詞賦惟以經義取士元祐元年十一月立經義詞賦兩科用侍御史劉摯之言也國初致仕以旌表士大夫之恬退者非如後世已死僞為之也真宗時主客郎中謝泌言致仕官如清名為衆所推粗有勞效方可聽其納祿咸平五年五月丙戌詔年七十退者許致仕如因疾或厯任有贓犯者不在此限大中祥符九年正月詔乞致仕者審官院具厯任有無贓犯檢勘吏部申上取㫖仁宗天聖四年始詔郎中以上致仕與一子官明道元年二月甲子又詔員外郎以上致仕者録其子為祕書省校書郎三丞以上為太廟齊郎二年正月庚寅又詔三丞以上致仕無子聽官嫡孫若弟姪一人降一等凡此者皆以利誘之也景祐三年六月甲戌侍御史司馬池上言文武官年七十令自陳致仕依舊勑與一子官如分司給全俸違者御史臺糾察特令致仕更不與子官及全俸詔榜朝堂皇祐三年二月戊子又詔文武官年老無子孫奏朞親一人至和元年十二月庚子又詔文武官年七十以上未致仕更不考課遷官有功於國有惠於民勿拘嘉祐三年十二月辛未又詔年七十居官犯事未致仕更不推恩子孫凡此者皆以法繩之也慶厯二年六月壬申朔御史中丞賈昌朝上言臣僚年七十筋力衰者優與改官致仕詔從之此以賞勸之也况法初行須受命之後陳乞恩澤病者尚不許豈容已死僞為其後又限以受命後身故者方許陳乞恩澤後又但以陳乞後身故者放行而詐僞者公行不忌矣今士大夫解官持服批書丁憂月日或與其父致仕月日自相抵牾有司未嘗詰也至徽宗朝始放行員外致仕恩澤政和二年張克公乞依武官副使非降黜中身亡者聽䕃補從之詳考前後詔令肇端於真宗之朝而詳密於仁宗之朝待之甚厚防之甚嚴責之甚備然上勞聖訓丁寧至於六七而不已亦可見風俗之日趨於薄而士大夫能守知足之戒者鮮矣真宗以朝官注擬於堂貧者留滯逆旅無以為資乃置朝集院於朱雀門外此咸平四年四月癸丑詔也院既成詔升朝官以上到闕並館於院中官給公劵出入則乘馬開封府差兵士隨直惟可至廟堂省部銓曹官㕔而已雖欲出入市廛不可得也故升朝官以上造朝則先匿於親戚故舊之家俟所幹置悉備方敢報閣門放見蓋閣門即日關報朝集院開封有人馬即至迎入院中雖不可出入而同院中士大夫日夕遊從情如兄弟或商確文字或彼此詢問風土或因而結交互相推薦其况味與栖栖逆旅者大不侔矣景祐二年十月辛亥詔復增置以士大夫之來者日多故也國初擢用人才不問資序有初補京官便除知州或差通判既不知仕塗之艱苦小官往往遭其慢視又且未厯民事不諳民間疾苦淳化四年十月庚午蘇易簡上言初任京官未厯州縣不得擬知州通判詔從之然惟施之常調爾若人主特除則又不在此例吕公弼年十九以水部員外郎即知廬州正如易簡所論不以改制而止也燕翼詒謀録卷五
