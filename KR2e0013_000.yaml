body:
  text: 燕翼詒謀録雜史類提要臣等謹案燕翼詒謀録五卷宋王栐撰栐字叔永自署稱晉陽人寓居山隂號求志老叟其名氏不概見於他書今考書中有紀紹興庚戍仲父軒山公以知樞宻院兼㕘知政事一條庚戌為紹興元年核之宋史是年五月甲午王藺知樞宻院是栐當為藺之猶子藺宋史無𫝊據徐自明宰輔編年録載藺無為軍人是書第三卷中所述無為軍建置特詳可以為證其稱晉陽者葢舉祖貫而言書中又有余曩仕山陽語知其嘗官淮北而所居何職則已不可考矣其書大㫖以宋至南渡而後典章放失祖宗之良法美政俱廢格不行而變為一切茍且之治故採成憲之可為世守者上起建隆下迄嘉祐凡一百六十二條并詳及其興革得失之由以著為鑑戒葢亦魚藻之義自序謂悉考之國史實録寳訓聖政等書凡稗官小説悉棄不取今觀其臚陳故實如絲聯繩貫本末粲然誠襍史中之最有典據者也乾隆四十六年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀燕翼詒謀録序仰惟藝祖皇帝肇造區夏宏規逺略傳之萬世太宗皇帝真宗皇帝仁宗皇帝嗣守丕基善繼善述凡所更張設施無非忠厚故深仁龎澤固結人心牢不可解雖中更新法多所更易其後封豕長蛇薦食上國而民以身徇國有死無貳至有城破比肩拱手就戮無一降者其培植涵養深根固帶豈一朝一夕之故哉昔漢祖入闗之初約法三章唐宗甫得天下定租庸調而漢四百年唐三百年基業實本於此然漢祖殁而吕氏用事唐宗亡而武氏革命孝文繼立能紹先志景帝刻薄則又反是𤣥宗討亂復以肇亂其眂皇朝列聖相繼卒代而廣聲者萬萬不侔矣人皆知罪熙豐以來用事之臣而不原祖宗立國之本㫖苟非規摹宏逺徳澤深厚則其效驗尚不能如漢唐之季世何以再肇中興之基夷攷建隆迄於嘉祐良法美意燦然具陳治平以後此意泯矣今備述於後與識者商確之以稽世變云寶慶丁亥孟冬既望求志老叟晉陽王栐叔永書於山隂寓居求志堂中稗官小説所載國朝典故多相矛盾故李公伯和質以國史為典故辨疑一書凡諸家所載無一非妄幾於可以盡廢今余所述無非考之國史實録寶訓聖政等書凡稗官小説悉棄不取蓋以前人為戒也凡我同志譏其妄論則可以為繆誤則不可矣苟有以警教之則又幸也中澣日再書
