body:
  text: 燕翼詒謀録卷一宋王栐撰唐末進士不第如王仙芝輩唱亂而敬翔李振之徒皆進士之不得志者也蓋四海九州之廣而嵗上第者僅一二十人苟非才學超出倫輩必自絶意於功名之塗無復顧藉故聖朝廣開科舉之門俾人人皆有覬覦之心不忍自棄於盜賊奸宄開寶二年三月壬寅朔詔禮部閲貢士十五舉以上曽經終場者具名以聞庚戌詔曰貢士司馬浦等一百六人困頓風塵潦倒場屋學固不講業亦難専非有特恩終成遐棄宜各賜本科出身此特奏所由始也自是士之潦倒不第者皆覬覦一官老死不止至景德二年三月丁已因賜李迪等進士第賜特奏名五舉以上本科六十四人三傳十八人同學究二十二人三禮四十四人年老授將作監主簿三十一人此特奏之名所由立也至景祐元年正月癸未詔進士諸科十取其二進士三經殿試諸科五經殿試或進士五舉年五十諸科六舉年六十雖不合格特奏名此特奏名所以漸多也至大中祥符八年二月丙子則命進士六舉諸科九舉特奏名並赴殿試則又以人多而裁抑之也况進士入官十倍舊數多至二十倍而特奏之多自是亦如之英雄豪傑皆汨沒消靡其中而不自覺故亂不起於中國而起於異域豈非得御天下之要術歟蘇子云縱百萬虎狼於山林而饑渴之不知其將噬人藝祖皇帝深知此理者也豈漢唐所可仰望哉自唐以來進士皆為知舉門生恩出私門不復知有人主開寶六年下第人徐士廉撾登聞鼓言久囷場屋乃詔入䇿進士終場經學並試殿庭三月庚午御講武殿覆試新進士宋準以下一百二十七人是嵗禮部所放進士十一人而已五經止二十二人藝祖皇帝以初御試特優與取放以示異恩而御試進士不許稱門生於私門一洗故習大哉宏模可謂知所先務矣國初承五季之亂吏銓書判拔萃科久廢建隆三年八月因左拾遺髙錫上言請問法書十條以代試判詔今後應求仕及選人並試判三道仍復書判拔萃科先是諸道州府參選者每年冬集於吏銓乾德二年正月甲申詔選人四時參選待之者甚厚責之者甚至真得馭臣之柄矣後因銓部姑應故事不分臧否雖文紕繆書不成字者亦令注官故真宗景德元年八月令銓司引對齎所試書判以備奏御仁宗即位之初以諸路闕官凡守選者並與放選以示特恩至景祐元年正月遂廢書判為銓試議者以為奏補人多令人假手故更新制曽不思書判猶如今之簾引雖有假手不可代書若銓試之弊則又甚矣雖他人代書可也省試猶可况銓試乎承平時假手者用薄紙書所為文揉成團名曰紙毬公然貨賣亦由朝廷施刑寖寬故也五代時尉職以軍校為之大為民患建隆三年十二月癸已詔諸縣置尉一員在主簿之下俸與主簿同始令初賜第人為之從趙普之請也國初選人有服緋紫或加階至大夫故人以為榮雖老於選調不悔乾德二年六月庚寅中書詳定陶穀等議防禦團練軍事推官軍事判官今從事郎三考加將仕郎試祕書省校書郎留守兩府節度推官今文林郎三考加承奉郎試大理評事掌書記防禦團練判官今儒林郎二考加宣德郎依前試大理評事兼監察御史留守兩府節度觀察判官今承直郎一考加朝散大夫試大理司直依前監察御史又轉而為諸府少尹申奏加檢校官或加憲銜觀察判官以上服緋又十五年服紫但不佩魚謂之階緋階紫非有勞績而厯任無過失者並不改官故改官之法亦優舊制借緋借紫皆不佩魚王詔為刑部侍郎上奏云與胥吏無别非所以示觀瞻乞與賜服人同佩魚從之然既許其佩魚袋則當改其銜為借紫金魚袋借緋魚袋今尚仍舊銜此有司失於申明也詔化基之孫舉元之子終工部尚書享年七十九舊制縣尉捕盜無改官者乾德六年三月庚寅詔尉逐賊被傷全火賜緋三分之二者減三選加三階五分之二者減二選加二階三分之一者減一選加一階縣令獲全火升朝人改服色餘如尉賞身死者録用的親子弟又詔捕寇立定日限已罹限外之責而終能獲賊者與除其罰不得書為勞績賞罰非不重也若遽令改官親民則過矣今之司理參軍五代之馬步軍都虞候判官也以牙校為之州鎮專殺而司獄事者輕視人命太祖皇帝開寶六年七月壬子詔州府並置司寇參軍以新及第九經五經及選人資序相當者充其後改為司理參軍國初進士尚仍唐舊制每嵗多不過二三十人太平興國二年太宗皇帝以郡縣闕官頗多放進士幾五百人比舊二十倍正月己巳宴新進士吕䝉正等於開寶寺賜御製詩二首故事唱第之後醵錢於曲江為聞喜之飲近代於名園佛廟至是官為供帳嵗以為常先是進士參選方解褐衣緑是嵗錫宴後五日癸酉詔賜新進士并諸科人緑袍靴笏自後以唱第日賜之惟賜袍笏不復賜靴世傳堂吏舊用士人吕夷簡改用吏人非也太祖皇帝以堂吏擅中書事權多為奸贓開寶六年四月癸巳詔流內銓於前任令録判司簿尉選諳練公事一十五人補堂後官三年一替令録除升朝官餘上縣五月庚辰以姜寅亮任能夏德崇孔崇煦為之此太祖開基立國之宏規也不特此爾寇準為宰相刑部大理寺三司法直副法直官舊例以令史遷補準悉用士人景德二年三月詔銓司選流內官一任三考無遺闕者引對試斷案授之蓋仰體太祖謹重堂後官之意而推廣之也然改制之初不能一掃而清之新舊雜用士大夫恥與為伍又三年為任人無固志舊吏長子孫為世業一齊不勝衆楚之咻太祖皇帝美意數傳之後寂然無聞是可恨也逺方寒士預鄉薦欲試禮部假丐不可得則寧寄舉不試良為可念謹按開寶二年十月丁亥詔西川山南荆湖等道所薦舉人並給來往公劵令樞密院定例施行蓋自初起程以至還鄉費皆給於公家如是而挾商旅干關節繩之以法彼亦何辭今不復聞舉此法矣前代郵置皆役民為之自兵農既分軍制大異於古而郵亭役兵如故太祖即位之始即革此弊建隆二年五月詔諸道州府以軍卒代百姓為遞夫其後特置遞卒優其廩給遂為定制五季武夫悍卒以軍功進秩為節度使者不可數計而班在卿監之下太祖皇帝以節度使受禪遂重其選升其班於六曹侍郎之上此建隆三年三月壬午詔書也故恩數同執政官而除拜鎖院宣麻尤異焉非宗室近屬外戚國壻年勞久次不得為此官此外則殿帥而已前宰執亦時有除拜者崇寧以來始有濫恩其後宦者皆得為之殊失太祖改制之本㫖矣前代賜時服惟將相翰林學士至諸軍大校而止建隆三年太祖皇帝謂宰相曰時服不賜百官甚無謂也宜並賜之乃以冬十月乙酉朔賜文武常參官時服自後遂為定制唐制為刺史者並借緋太平興國二年二月戊戌詔常參官知節鎮並借紫防禦團練刺史州借緋候回日依舊服色其服緋人任諸州亦借紫惟軍壘則否國初假試官乃以恩澤補授不理選限太宗皇帝即位牧伯皆遣子弟奉方物為賀悉以試七選吏部南曹赴調引對始授以官自後假試方得齒仕版矣太祖皇帝以趙普専權欲置副二以防察之問陶穀以下丞相一等有何官榖以參知政事參知機務對乾德二年四月乙丑乃以薛居正吕餘慶為參知政事不押班不知印不升政事堂曽不思唐朝宰相名色最多若僕射若內史若納言若參預朝政若同二同三品其為相則均也而為同平章事乃資厯之最淺者自天寶之亂多以資淺者為之而此名一定不易矣穀以儒學見重於太祖而不考前代典故如此此官之設幾於宰相之屬其後至道元年四月戊子更制令升政事堂知印押班一同宰相仍合班為一其後為相者漸多而參政之權漸輕不得有所可否矣官制未改之前凡宰執官自為一班獨出百官之上雖前宰相以宫師致仕者皆不得與宰執官齒乾德元年太祖因朝㑹見太子師侯益等班次在下乃以閏十二月丙子降詔凡一品致仕曽帶平章事者朝㑹綴中書門下班自後禮絶百僚矣先是選人不給印紙遇任滿給公憑到選以考功過往往於已給之後時有更易不足取信太平興國二年正月壬申詔曰今後州府録曹縣令簿尉吏部南曹並給印紙厯子外給公憑者罷之自此奔競巧求者不得以公憑營私更易改給矣唐末藩鎮諸州聽命帥府如臣之事君雖或因朝命除授而事無巨細皆取決於帥與朝廷幾於相忘太平興國二年三月右拾遺李翰極言其弊太宗皇帝始詔藩鎮諸州直𨽻京師長吏自得奏事而後天下大權盡歸人主潛消藩鎮跋扈之心今長吏初除替滿奏事自此始也舊制品官服緋紫皆以品格故選人久次多服緋紫京朝遷轉之速者反多服緑太平興國六年十一月冬至郊祀赦文令常參官衣緋緑二十年於吏部投狀具履厯以聞始以實厯後以應格者少改用蒞事日為始遂為定制舊制中書舍人諫議大夫權侍郎並服黑帶佩金魚霍端友為中書舍人奏事徽宗皇帝顧其帶問云何以無别於庶官端友奏非金玊無用紅鞓者乃詔四品從官改服紅鞓黑犀帶佩金魚今武臣大使臣以上紅鞓不知何所從始也國初士庶所服革帶未有定制大抵貴者以金賤者以銀冨者尚侈貧者尚儉太平興國七年正月壬寅詔三品以上銙以玉四品以金五品六品銀銙金塗七品以上并未嘗參官并內職武官以銀上所特賜不拘此令八品九品以黑銀今世所謂藥㸃烏銀是也流外官工商士人庶人以鐵角二色其金荔枝銙非三品以上不許服太宗特新此銙其品式無傳焉其後毬文笏頭御仙又出於太宗特製以别貴賤而荔枝反為御仙之次雖非從官特賜皆許服初品京官特賜帶者即服紫矣鞍轡之别亦始於太宗時太平興國七年正月詔常參官銀裝鞍絲絛六品以下不得鬧裝仍不得用刺繡金皮飾韉未仕者烏漆素鞍則是一命以上皆可以銀裝鞍也近嵗惟郡太守猶存銀裝絲絛之制此外無敢用者若烏漆則庶人通用而鞍皮之巧無所不至其用素鞍者鮮矣國初仍唐舊制有官者服皂袍無官者白袍庶人布袍而紫帷施於朝服非朝服而用紫者有禁然所謂紫者乃赤紫今所服紫謂之黑紫以為妖其禁尤嚴故太平興國七年詔曰中外官并貢舉人或於緋緑白袍者私自以紫於衣服者禁之止許白袍或皂袍至端拱二年忽詔士庶皆許服紫所在不得禁止而黑紫之禁則申嚴於仁宗之時今北人之服乃是國初申嚴之制此理所不可曉也太祖皇帝收藩鎮之權雖大藩府不敢臣屬其下使之拜伏於庭而為小官者亦漸有陵慢其上之意咸平五年五月壬戌知開封府寇準極陳其不可乃詔開封府左右軍巡使京官知司録諸曹參軍知畿縣見知府並庭參設拜自後諸州選人並拜於庭故老泉上書亦嘗言之不知此禮廢於何時進士舊無免解之條咸平二年六月丙戌詔貢舉應三舉人並免取解若三舉連中則是九年三舉不連中則有二三十年者不若限以十八年之為均平也若四舉連中則亦罕有不為濫矣國初士大夫往往久任亦罕送迎小官到罷多芒履䇿杖以行婦女乘驢已為過矣不幸丁憂解官多流落不能歸咸平二年三月甲戌詔川峽廣南福建路官丁憂不得離任聖主端居九重而思慮至此則從宦逺方者不至於畏憚而不敢往祖宗仁厚之澤大抵如此其後以川峽距京師不甚逺至景德二年三月復聽川峽官丁憂惟長吏奏裁尉職警盜村鄉爭鬭憚經州縣者多投尉司尉司因此置獄拷掠之苦往往非法咸平元年十月己丑有詔申警悉毁撤之詞訴悉歸之縣蓋後生初任未厯民事輕於用刑縣令權輕不能制伏民受其殃此令一行至今無敢犯者銓曹吏人奸弊最甚掌銓者雖聰明過人皆不能出真宗朝有以為言者咸平三年十二月丁未詔選判司簿尉充吏部流內銓南曹主事所以重士大夫之選其視待流外者霄壤不侔矣燕翼詒謀録卷一
