body:
  text: 燕翼詒謀録卷二宋王栐撰國初三嵗郊祀士大夫皆遷秩真宗即位孫何力陳其濫乞罷遷秩之例仍命有司考其殿最臨軒黜陟咸平四年四月方頒行自後士大夫循轉頗艱國初進士科場尚寬禮闈與州郡不異景德二年七月甲戌禮部貢院言舉人除書案外不許將茶厨蠟燭等入除官韻外不得懷挾書䇿犯者扶出殿一舉其申嚴誠是也而元豐貢院之火死者甚衆則是法不行也又試場所問本經義疏不過記出處而已如吕申公試卷問子謂子産有君子之道四焉所謂四者何也答曰對其行已也恭其事上也敬其養民也惠其使民也義謹對試卷不謄録而考官批於界行之上能記則曰通不記則曰不十問之中四通則合格矣其誤記者亦只書曰不而全不能記答曰對未審謹對雖已封彌而兼采譽望猶在觀其字畫可以占其為人而士之應舉者知勉於小學亦所以誘人為善也自謄録之法行而字畫之繆或假手於人者肆行不忌人才日益卑下矣行卷之禮人自激昻以求當路之知其無文無行鄉閭所不齒亦不敢妄意於科舉使古意尚存則如章子厚者豈容其應進士舉乎舊制進士首選同唱第人皆自備錢為鞍馬費而京師遊手之民亦自以鞍馬候於禁門外雖號廷魁與衆無以異也大中祥符八年二月戊申詔進士第一人金吾司差七人導從兩節前引始與同列特異矣進士考試差官屬之轉運使惟許本路差官大中祥符八年二月乙卯詔本路闕人即報鄰路差納粟補官國初無天禧元年四月登州年平縣學究鄭巽出粟五千六百石賑饑乞補第巽不從朝迥李維上言乞特從之以勸來者豐稔即止詔補三班借職今承信郎自後援巽例以請者皆從之然州縣官不許接坐止令庭參熙寧元年八月詔給將作監主簿齊郎助教牒募民實粟於邊此古人募民實粟塞下遺意也因記淳熙間詔以旱故募出粟拯民二干石補初品官而龍舒一郡應格者數人郡以姓名來上孝宗皇帝疑而不與仲父軒山先生力諫以為失信於人恐自後歉嵗無應募者孝宗亟從之已而應募者衆舊制朝臣監司因事謫官多為監當雖在貶所猶以前任舉官言者以為無以示貶抑之意天禧元年五月壬戌始制因罪監當不得舉官充知縣朝臣不得舉本州幕職官前朝貶謫雖重叙用亦驟未聞其黜免而置之閒地也王安石一時私意貽害無窮罪不勝誅國猶為其所誤而况士大夫乎國初士大夫俸入甚微薄尉月給三貫五百七十而已縣令不滿十千而三之二又復折支茶鹽酒等所入能幾何所幸物價甚廉粗給妻孥未至凍餒然艱窘甚矣景德三年五月丙辰詔赤畿知縣已令擇人俸給宜優自今兩赤縣月支見錢二十五千米麥共七斛畿縣七千户以上朝官二十千六斛京官二十千五斛五千户以上朝官二十千五斛京官十八千四斛三千户以上朝官十八千京官十五千米麥四斛三千户以下京官錢十二千米麥三斛是時已為特異之恩至四年九月壬申詔曰並建庶官以釐庶務宜少豐於請給以各勵於廉隅自今文武官月請折支並給見錢六分外任給四分而惠均覃四海矣舊制士人與編氓等大中祥符五年二月詔貢舉人曽預省試公罪聽收贖而所贖止於公罪徒其後私罪杖亦許贖論唐朝職掌因五季之亂遂至錯亂或廢不舉給事中掌封駮不可一日無皇朝淳化四年太宗皇帝推考廢職始於唐末乃命魏庠柴成務同知給事中未幾𨽻銀臺通進司為封駮司真宗咸平四年七月吏部侍郎知封駮司陳恕乞鑄印命取門下印用之因改其名為門下封駮司國初五品以上任子有陳乞攝太祝者雖班初品選人下然不一二年經營巧求即同正員是與侍從奏補無以異也至道二年四月乙未太宗皇帝深懲其弊乃詔五品以上任子悉同學究出身不許攝太祝自後京選判然巧求者無所容其奸應伎術官不得與士大夫齒賤之也至道二年正月申嚴其禁雖見任京朝遇慶澤只加勳階不得擬常參官此與書學畫學算學律學並列於文武兩學者異矣王師初下廣南北人畏瘴厲無敢往者雖武臣亦憚之後有武臣自廣南替回陳乞免短使者銓部以聞大中祥符八年七月辛亥始詔三班使臣任廣南差遣替回並免短使遂以為制祖宗立國之初崇尚儉素金銀為服用者鮮士大夫罕以侈靡相勝故公卿以清節為髙而金銀之價甚賤至東封西祀天書降天神現而侈費寖廣公卿士大夫是則是效而金銀之價亦從而增故大中祥符八年十一月乙已真宗皇帝覽三司奏乏銀支用問輔臣曰咸平中銀兩八百金兩五千今何增踊如此然不知是時其價若干也蓋上以為重則下競趨之求之者多則價不得不踊咸平距祥符十數年間世變已如此况承平日久侈費益甚沿襲至於宣政之間乎是宜價日增而未已也國初沿江置務收茶名曰榷貨務給賣客旅如鹽貨然人不以為便淳化四年二月癸亥詔廢沿江八處應茶商並許於出茶處市之未幾有司恐課額有虧復請於上六月戊戌詔復舊制六飛南渡後官不能運致茶貨而榷貨務只賣茶引矣皇朝吏銓不曰尚書吏部而曰考課院其上著京朝官幕職州縣官以别之淳化四年二月丙戌詔改考課京朝官院為審官院考課幕職州縣官院為考課院而總謂之流內銓云唐有理匭使五代以來無聞太宗皇帝淳化三年五月辛亥詔置理檢司以錢若水領之其後改曰登聞院又置鼓於禁門外以達下情名曰鼓司真宗景德四年五月戊申詔改鼓司為登聞鼓院登聞院為檢院應上書人並詣鼓院如本院不行則詣檢院以朝官判之判院之名始於此大理寺奏案刑部審覆奏而行之太宗皇帝慮刑部大理寺吏舞文巧詆特置審刑院於禁中以李昌齡為之中覆下丞相必又以聞始論決淳化二年八月已卯詔行之謹重人命如此自官制改并歸刑部不復有中覆矣唐百官入閣有待制次對官德宗興元中日令常參官三兩人奏事後唐天成中廢待制次對官五日一次內殿百官轉對長興二年停晉天福七年復漢乾祐二年陶穀奏罷之淳化二年十一月丙申太宗皇帝再復舊制詔百官次對每日兩次諸州貢士國初未有限制來者日增淳化三年正月丙午太宗命諸道貢舉人悉入對崇政殿凡萬七千三百人時承平未久也不知其後極盛之時其數又幾倍也世有惡少無賴之人肆凶不逞小則賭博大則屠牛馬銷銅錢公行不忌其輸錢無以償則為穿窬若黨類頗多則為劫盜縱火行奸殺人不防其微必為大患淳化二年閏二月己丑詔相聚蒲博開匱坊屠牛馬驢狗以食私銷銅錢為器用並令開封府嚴戒坊市捕之犯者定行處斬引匿不以聞與同罪所以塞禍亂之源驅斯民納之善也其後刑名寖輕而法不足以懲姦犯之者衆嘗怪近世士大夫蒞官視此三者為不急之務知而不問者十常七八因訴到官有不為受理者是開盜賊之門也毋乃不思之甚乎皇朝以孝治天下篤厚人倫子之出繼他位者得封贈其本生父母此前所未聞也李昉為宰相上言臣叔父超故任工部郎中集賢殿學士叔母謝氏故陳留郡君是臣本生父母臣不報罔極之恩為名教罪人今郊祀覃恩望與追榮太宗皇帝嘉之淳化四年二月乙丑詔贈超為太子太師謝氏鄭國太夫人然此猶因昉有請而從之也至真宗天禧元年八月辛未詔文武升朝官父不在無嫡母繼母者許叙封本生父母則四海之內均沾寵惠雖於古禮違悖亦忠厚之至也士大夫之家不幸出妻為之子者非其親生猶可不服苟其所親生而視之恝然則非人類矣張永德父穎先娶馬氏生永德為穎所出永德知鄧州於州廨作二堂左繼母劉氏居之右馬氏居之不敢以出母加於繼母永德事二母如一人無間言時大臣母妻皆得入謁劉氏存日馬不敢同入禁中劉氏卒馬始得入謁太宗勞問嘉歎封莒國太夫人此可為人子事出母之法仁宗景祐三年九月集賢校理郭稹乞為嫁母服詔兩制御史太常寺禮院議詔自今並許解官申心喪前代名賢之後纍聖褒表最顯著有四人一曰狄梁公仁傑二曰張曲江公九齡三曰段太尉秀實四曰郭汾陽王子儀真宗景德三年正月丙戌張公九世孫元吉詣闕獻明皇墨跡井張公寫真告身詔以為韶州文學大中祥符四年八月丙辰以段公孫亮為三班借職仁宗天聖六年七月張公九世孫錫又以公告身并明皇批答來獻補試國子四門助教慶厯三年三月壬辰詔以狄公孫華州明法狄國賓為本州助教四年正月丙戌以郭公裔孫元亨為永興軍助教元豐五年四月復以段公八世孫文酉為隴州助教復其家國家非靳一命於先賢也謹惜名器雖賢者猶爾况䙝用之乎咸平景德以後粉飾太平服用寖侈不惟士大夫之家崇尚不已市井閭里以華靡相勝議者病之大中祥符元年二月詔金箔金銀線貼金鎖金間金蹙金線裝貼什器土木玩之物並行禁斷非命婦不得以金為首飾許人糾告並以違制論寺觀飾塑像者齎金銀并工價就文思院換易四年六月又詔宫院苑囿等止用丹白裝飾不得用五綵皇親士庶之家亦不得用春幡勝除宣賜外許用綾絹不得用羅諸般花用通草不得用縑帛八年三月庚子又詔自中宫以下衣服並不得以金為飾應銷金貼金縷金間金戭金圈金解金剔金撚金陷金明金泥金榜金背金影金闌金盤金織金金線皆不許造然上之所好終不可得而絶也仁宗繼統以儉朴躬行於慶厯二年五月戊辰申嚴其禁上自宫掖悉皆屏絶臣庶之家犯者必置於法然議者猶有憾以為有未至焉自是而後此意泯矣真宗皇帝東封西祀思顯先烈大中祥符七年正月乙卯詔升應天府為南京建行宫正殿以歸德為名以聖祖殿為鴻慶宫奉太祖太宗像侍立於聖祖之旁其後遂開髙宗皇帝中興之祥殆非偶然者僧徒奸狡雖人主之前敢為欺罔江東有僧詣闕乞修天臺國清寺且言如寺成願焚身以報太宗從之命中使衛紹欽督役戒之曰了事了來紹欽即與俱往不日告成紹欽積薪如山驅使入火僧哀鳴乞回闕下靣謝皇帝而後自焚紹欽怒以義義入烈焰僧宛轉悲號而絶歸奏太宗曰臣已了事太宗頷之苟非就焚太宗必以欺罔戮之於市矣黃冠之教始於漢張陵故皆有妻孥雖居宫觀而嫁娶生子與俗人不異奉其教而誦經則曰道士不奉其教不誦經惟假其冠服則曰寄褐皆游惰無所業者亦有凶嵗無所給食假寄褐之名挈家以入者大抵主首之親故也太祖皇帝深疾之開寶五年閏二月戊午詔曰末俗竊服冠裳號為寄褐雜居宫觀者一切禁斷道士不得畜養妻孥已有家者退出外居止今後不許私度須本師知觀同詣長吏陳牒給公憑違者捕繫抵罪自是宫觀不許停著婦女亦無寄食者矣而黃冠之兄弟父子孫姪猶依憑以居不肯去也名曰親屬大中祥符二年二月庚子真宗皇帝詔道士不得以親屬住宫觀犯者嚴懲之自後始與僧同其禁約矣國忌行香本非舊制真宗皇帝大中祥符二年九月丁亥詔曰宣祖昭武皇帝昭憲皇后自今忌前一日不坐羣臣進名奉慰寺觀行香禁屠廢務著於令自後太祖太宗忌亦援此例纍朝因之今惟存行香而已進名奉慰久已不有亦不禁屠雙忌則休務單忌亦不廢務矣太祖征李重進還以御營建寺所御之榻存焉後僧徒共建一殿申嚴崇奉名彰武殿且請降御容使民庶瞻仰真宗皇帝命翰林畫工圗寫嚴衛而往仍賜供具景德二年八月癸已命中使前往奉安遇朔望州郡率官僚朝禮六飛南度蕩為煨燼後雖建殿不復奏請御容姑存遺跡而已太宗皇帝命內侍裴愈與山隂縣令李易直訪王羲之蘭亭舊跡其流杯修禊處在越州僧子謙因請建寺於舊跡以藏御札至道二年二月壬辰詔從子謙之請賜寺名天章仍以御書賜之東京相國寺乃瓦市也僧房散處而中庭兩廡可容萬人凡商旅交易皆萃其中四方趨京師以貨物求售轉售他物者必由於此太宗皇帝至道二年命重建三門為樓其上甚雄宸墨親填書金字額曰大相國寺五月壬寅賜之僧寺戒壇尼受戒混淆其中因以為姦太祖皇帝尤惡之開寶五年二月丁丑詔曰僧尼無間實紊教法應尼合度者只許於本寺起壇受戒令尼大德主之如違重置其罪許人告則是尼受戒不須入戒壇各就其本寺也近世僧戒壇中公然招誘新尼受戒其不至者反誣以違法尼亦不知法令本以禁僧也亦信以為然官司宜申明禁止之萬夀觀本玉清昭應宫也宫為火所焚惟長生崇夀殿存殿有三像聖祖真宗各用金五千兩餘昊天玉皇上帝用銀五千餘兩仁宗天聖七年詔玉清昭應宫更不復修以殿為萬夀觀蓋明肅太后尚有修營之意宰臣猶帶使領至是始去之示不復修營也真宗皇帝朝盛禮縟儀婁舉費金最多金價因此頓長人以為病仁宗明道二年正月癸未詔冊寶法物凡用金者並改用銀而以金塗之自此十省其九至今惟寶用金餘皆金塗也燕翼詒謀録卷二
