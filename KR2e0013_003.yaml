body:
  text: 燕翼詒謀録卷三宋王栐撰太宗皇帝以海内混一四方無虞乃於江南置太平軍江北置無為軍取太平無為之義太平後改為州無為之建在淳化四年十二月戊戌至大中祥符二年建軍方十有六年災異變怪忽發八月中有青蛇長數丈出郡治十六日風雨林木城門營壘盡壞壓死千餘人夜三鼓方止九月乙亥奏至真宗皇帝亟命中使張景宣馳驛恤視民壞屋者無出來年夏租壓死者家賜米一斛無主及貧乏者官收瘞之令長吏就宫觀精䖍設醮為民祈福是時方尚祥瑞宰相甚怒加譴郡守真宗不從其後守臣懲艾於五年三月壬午奏甘露降桐樹七年七月庚寅奏聖祖殿叢竹内獲毛屨二以為聖祖降九年四月奏瑞氣覆巢湖畫圗來上皆奉承上意也洎至皇祐三年仁宗皇帝在位三十年矣六月丁亥守臣茹孝標奏城内小山生芝三百五十本悉以上進改名其山曰紫芝山蕞爾一培塿不應一時所産若是之多也上怒曰朕以豐年為瑞賢臣為寶草木蟲魚之異烏足尚哉茹孝標與免罪戒州縣自今無得以聞大哉王言足以警臣子之進諛者矣虞書載簫韶九成鳯凰來儀三代以後無傳焉惟漢宣帝時嘗見史不載其形狀如何真宗景徳元年五月七日午時白州有鳯凰三自南入城衆禽周遶至萬嵗寺前樓髙木上身如龍長九尺髙五尺其文五色冠如金盞至申時飛向北去遂不復見州畫圗來上是時天下承平日乆可謂治世宜其覽徳輝而下也若麟惟先聖識之漢武獲一角獸當時以為麟太史公不以為然也太平興國九年十月癸已嵐州獻獸一角似鹿無斑角端有肉性馴善詔羣臣參驗徐鉉滕中正王佑等上奏曰麟也宰相宋琪等賀官𣙜酒酤其來乆矣太宗皇帝深恐病民淳化五年三月戊申詔曰天下酒𣙜先遣使者監筦宜募民掌之減常課之十二使其易辦吏勿復預盖民自鬻則取利輕吉凶聚集人易得酒則有為生之樂官無譏察警捕之勞而課額一定無敢違欠公私兩便然所入無贏餘官吏所不便也新法既行悉歸於公上散青苗錢於設㕔而置酒肆於譙門民持錢而出者誘之使飲十費其二三矣又恐其不顧也則命娼女坐肆作樂以蠱惑之小民無知爭競鬭毆官不能禁則又差兵官列枷杖以彈壓之名曰設法賣酒此設法之名所由始也太宗之愛民寜損上以益下新法惟剥下奉上而且誘民為惡陷民於罪豈為民父母之意乎今官賣酒用妓樂如故無復彈壓之制而設法之名不改州縣間無一肯釐正之者何耶江南李主佞佛度人為僧不可數計太祖既下江南重行沙汰其數尚多太宗乃為之禁至道元年六月己丑詔江南兩浙福建等處諸州僧三百人嵗度一人尼百人嵗度一人自昔嵗度僧道惟試經且因寺之大小立額如進士應舉然雖奸猾多竄身其中而庸蠢之甚者無所容自朝廷立價鬻度牒而僕厮下流皆得為之不勝其濫矣州長吏不親監決中唐以來為然遇引㫁皆牙校監決於門外太宗恤刑慮有寃濫至道元年六月己亥詔諸州長吏凡決徒罪並須親臨因太常博士王杕有請也今州郡杖罪悉委職幕官而徒罪必自監決帥府則以徒罪委通判聖朝謹嚴於用刑盖以人命為重也䘮家命僧道誦經設齋作醮作佛事曰資㝠福也出𦵏用以導引此何義耶至於鐃鈸乃樂器也北俗燕樂則撃之而可用於䘮柩乎世俗無知至用鼓吹作樂又何忍也開寶三年十月甲午詔開封府禁止士庶之家䘮𦵏不得用僧道威儀前引太平興國六年又禁送𦵏不得用樂庶人不得用方相魌頭今犯此禁者所在皆是也祖宗於移風易俗留意如此惜乎州縣間不能舉行之也江南李唐舊用鐵錢盖因韓熈載建議以鐵錢六權銅錢四然銅鐵之價相去甚逺不可强也江南末年鐵錢十僅直銅錢一江南平民間不肯行用轉運使樊若水請廢之太平興國二年二月詔官收民間鐵錢鑄為農器以給江北流民之歸附者於是江南鐵錢盡矣然川蜀陜西用之如故川蜀每鐵錢一貫重二十五斤銅錢一當十三小民鎔為器用賣錢二千於是官錢皆為小民盗銷不可禁止大中祥符七年知益州凌䇿請改鑄每貫重十二斤銅錢一當十民間無鉟銷之利不復為矣慶厯初知商州皮仲容議采洛南紅崖虢州青水銅置阜民朱陽二監鑄大錢一可當小錢三以之當十民間趨利盗鑄不已至八年張方平宋祁議以為當更乃詔改銅錢當十先是慶厯元年十一月詔江饒池三州鑄鐵錢一百萬貫助陜西經費所積尤多錢重民苦之至是併罷鑄鐵錢其患方息舊制命官鎖㕔應舉先於所屬選官考試所業方聽取解至禮部程文紕繆勒停不合格者贖銅永不得應舉中格庭對唱第日仍降甲盖期待任子者甚厚非比寒士也雖欲假手其可得乎故當時由此塗出者皆為文人仁宗欲開誘進之路天聖四年六月辛未詔免舉所業下第人免責罰仍許再應舉景祐元年復詔鎖㕔人不合格除其罪以試者尚少而申明之也然自是任子心無所憚雖實無才能者亦求試矣國朝故事三元張燈太祖乾徳五年正月甲辰詔曰上元張燈舊止三夜今朝廷無事區宇乂安方當年穀之豐登宜縱士民之行樂其令開封府更放十七十八兩夜燈後遂為例太宗淳化元年六月丙午詔罷中元下元張燈官雖廢之而私家猶有私自張燈者余曩仕山陽中元下元酒務張燈賣酒豈北方遺俗猶有存者耶北俗遇月三七日不食酒肉盖重道教之故而七夕改用六日太平興國三年七月乙酉詔曰七夕佳辰近代多用六日宜以七日為七夕頒行天下盖方其改用六日之時始於朝廷故釐正之自朝廷始月令開氷獻羔在仲春之月五季之亂訛舛至用四月淳化三年三月己未詔改正之祖宗留意民事丁寜戒飭雖州縣小官未嘗少怠太平興國八年三月丁未詔應京朝官受任於外并州縣幕職官朝辭并於閤門宣㫖戒朂以其詞著之坐右不知此制廢於何時苟州縣小官亦䝉皇恩寵綏決知自重思所以稱上意不敢自暴自棄矣惜無能舉行之者也承平時闕多員少士大夫注擬必求須次者以自便盖王事鞅掌乆勞於外乍還鄉里展掃墳墓聚㑹親族料理生産作業勢使之然甚而違年繩以三尺不能禁也淳化二年正月己丑詔京朝官釐務於外者受詔後給假一月澣濯所在州府以赴上日聞違者有罪其後進士既多任子亦衆故東坡進䇿有一官三人共之之説以為居者一人去者一人而伺之者又一人莅官之日少閒居之日長而士大夫至於冒法况今一官而五六人共之耶雍熈三年九月癸未詔知州通判幕職州縣官秩滿至京師於法書内試問如全不知者量加殿罰所以闗防檢察癃老昏繆疾病之人也今知州到闕必須奏事通判而下不復舉行殊失祖宗謹重州縣勤恤民瘼之意豈非不才者多惡其害已而不欲舉行之乎漢天子印符曰璽後世因其名不改國初御前之印書詔之印天子合同之印其名不正雍熈三年十月丙午並改為寶别鑄用之皇祐五年仁宗以奉宸庫有美玉廣尺厚半之命製為鎮國神寶宰臣龐籍篆文劉沆書牌哲宗元符元年咸陽民段義獻玉璽云紹聖三年河南鄉脩造家舎掘得之色緑如藍文曰受命于天既夀永昌其背螭紐五盤詔蔡京等議之咸以為真秦璽也詔仍舊為傳國璽徽宗大觀元年詔求美玉製八寶以易六璽十一月壬戌詔曰永惟受命之符宜有一代之制而尚循秦舊六璽之用自天申命地不愛寶獲全玊於異域得妙工於編氓八寶既成夐無前比可以來年正月朔日御大慶殿恭受八寶是舉恩數特厚政和七年九月辛已又製定命寶範圍天地幽贊神明保合太和萬夀無疆為文廣九寸號九寶二聖北狩寶淪異域髙宗皇帝復掣八寶循大觀舊規也大中祥符八年二月丁酉值仁宗皇帝誕生之日真宗皇帝喜甚宰臣以下稱賀宫中出包子以賜臣下其中皆金珠也是年仁宗方就學天生聖人得於夢兆方五嵗聖質已異常人故均福臣下者特異真宗時開封府洎京畿縣受納綿多取出剰訖事悉掊其餘均賜官吏而官吏無厭愈更多取嵗増不已景徳三年六月壬辰詔悉蠲之官吏所賜以官錢給其直國初吏人皆士大夫子弟不能自立者忍恥為之犯罪許用䕃贖吏有所恃敢於為奸天聖七年三月乙丑三司吏母士安犯罪用祖令孫䕃詔特決之仍詔今後吏人犯罪並不用䕃又詔吏人投募責狀在身無䕃贖方聴入役苟吏可用䕃則是仕宦不如為吏也誘不肖子弟為惡莫此為甚禁之誠急務不可緩也舊制京朝官實厯知縣三任入同判同判實厯三任入知州天聖六年七月己亥詔自今任内有五人同罪奏舉減一任同判後改為通判至今因之各以兩任四考闗陞審官院定差知州軍並以資厯不容超越資厯當得不容不與天聖七年九月辛巳詔審官院定差並申中書引上審視若懦庸老疾不任事者罷之今都堂審察其遺意也國初奏薦之制甚寛不拘服屬逺近天聖四年始詔臣僚奏薦子弟須言服紀不許奏無服之親冒奏者不以赦原其後又以服屬之親疎為奏官之髙下可謂良法乾興元年仁宗皇帝登寶位八月令學士院試諸州進奉賀登位人曽舉進士試大理評事曽舉諸科試祕書省正字餘試校書郎不願試人太廟齋郎凡四等試大理評事元豐為假承事郎今為通仕郎出官從事郎試祕書省正字元豐為假承奉郎今為登仕郎出官迪功郎太廟齋郎元豐未改今為將仕郎出官亦迪功郎其後例補將仕郎惟宰執得登仕郎大中祥符八年仁宗封夀春郡王以張士遜崔遵度為友講學之所為資善堂此資善之名所由始也自後元良就學所皆曰資善五代諸侯跋扈枉法殺人主家得自殺其奴僕太祖建國首禁臣下不得専殺至建隆三年三月己巳降詔郡國㫁大辟録案朱書格律㫁詞收禁月日官典姓名以聞取㫖行之自後生殺之權出於上矣然主家猶擅黥奴僕之面以快其忿毒真宗咸平六年五月復詔士庶之家奴僕有犯不得黥面盖重於戕人肌膚也祖宗謹重用刑苟可以施忠厚者無所不用其至如詔太嵗三元聖節不決死罪則淳化二年三月也令衆人自五月一日至八月一日免則天聖四年四月辛未詔也列聖相承莫敢不遵此所以祈天永命歟祖宗舊制州郡公使庫錢酒専饋士大夫入京往來與之官罷任旅費所饋之厚薄隨其官品之髙下妻孥之多寡此損有餘補不足周急不繼冨之意也其講睦鄰之好不過以酒相遺彼此交易復還公帑苟私用之則有刑矣治平元年知鳯翔府陳希亮自首曽以鄰州公使酒私用貶太常少卿分司西京乃申嚴其禁公使酒相遺不得私用並入公帑其後祖無擇坐以公使酒三百小瓶遺親故自直學士謫授散官安置况他物乎故先世所厯州郡得鄰郡酒皆歸之公帑換易答之一瓶不敢自飲也師傅保輔佐人主其名甚重非道尊徳重不可以居也師導之教訓傅傅其徳義保保其身體如周召畢公之於成王可以當是名矣漢之張禹孔光辱莫甚焉鄧禹其庶㡬乎後世以為階官而序進之失其本㫖矣若皇子加官而冠以師傅保之稱此何義也子雖賢而可為父之師傅保乎况有年方孩幼即加是官者尤悖理矣故英宗治平二年御史中丞賈黯力陳其非四月丙午詔止加三公太尉司徒司空是也自此名正言順人無得而議宣政以後至以師傅保加之宦豎其悖理尤甚矣選人改京朝官憚於作縣多厯閒慢比折知縣資序熈寜十年二月戊子詔選人磨勘改京朝官須入知縣雖不拘常制不得舉辟近世此禁寖弛凡改官人有出身任教授無出身任簽判二考滿則赴部注破格通判矣孝宗皇帝申嚴舊制仍以三年為任考第未足或有過犯不得注通判至今遵行之禮經女子出適以父母三年之䘮折而為二舅姑父母皆為朞䘮太宗孝明皇后居昭憲太后之䘮齊衰三年故乾徳二年判大理寺尹拙少卿薛允中等奏三年之内几筵尚存夫居苫塊之中婦被綺羅之飾夫婦齊體哀樂不同乞令舅姑之䘮婦從其夫齊斬三年於義為稱十二月丁酉朔詔從之遂為定制燕翼詒謀録卷三
