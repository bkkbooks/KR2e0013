body:
  text: 燕翼詒謀録卷四宋王栐撰江南初下李後主朝京師其羣臣隨才任使公卿將相多為小官惟任州縣官者仍舊至於服色例令服緑不問官品髙下以示别於中國也太宗淳化元年正月戊寅赦文應諸路偽授官先賜緋人止令服緑今並許仍舊其先衣紫人任常參官亦許仍舊遂得與王朝官齒矣楊萬頃殺張審素審素二子瑝琇為父復仇殺萬頃張九齡欲活之李林甫必欲殺之而二子竟伏大刑盖九齡君子喜人為善林甫小人嫉人為善好惡不同故也苟其父罪當死子不當報仇父死不以罪或非出上命而為人所擠陷以死可不報乎審素之仇所當報也太宗雍熈三年七月癸未京兆府鄠縣民甄婆兒報母仇殺人詔決杖遣之惜乎瑝琇之不遇聖時明主也歐陽脩少孤其叔父教之學既貴乞以一官回贈以報其徳詔從之乃自員外郎贈郎中後世以為美談不知又有先於脩者王曽為參知政事改葬叔太子中舎宗元叔母嚴氏自言幼孤叔父母育之詔贈宗元工部員外郎嚴氏懷仁縣太君李遵朂本名朂崇矩之孫繼昌之子真宗朝尚長公主御筆増為遵朂升為崇矩之子繼昌之弟自此為例實亂人倫治平四年二月神宗皇帝手詔述英宗治命應公主出降其夫不得升同父行盖英宗乆欲釐正以病未果出命故神宗以遺命行可謂善述人之事矣士大夫治小民之譽者縱小民妄訴雖虚妄灼然亦不及坐甚而聽其驀越㡬於樓攬生事矣曽不思善良之民畏官府如虎狼甘受屈抑不敢理雪而奸猾之民以恐脇把持為生與吏囊橐視官府如私家肆行不忌士大夫墮其計中為其所困殊不自覺良可歎也太祖皇帝乾徳二年正月乙巳詔應論訴人不得驀越陳狀違者科罪開基創業之初首念及此慮為善良害也真宗咸平元年七月詔所訴虚妄好持人短長為鄉里害者再犯徒三犯杖訖械送軍頭引見司苟能舉而行之庶㡬妄訴者息矣舊制朞䘮百日内妨試尊卑長幼同士人病之多入京冒哀就同文試洎中選被人論訴不免坐罪天禧四年二月壬申翰林學士承㫖晁迥上言諸州士人以朞制妨試奔湊京轂請自今卑幼朞服不妨取解詔從之自後冒哀求試者寡矣大凡人家尊長朞䘮多年髙者卑幼朞䘮多年幼者免避卑幼則妨試亦鮮國初宗室尚少𨽻宗正寺仁宗景祐三年以宗室衆多特置大宗正司以皇兄寜江軍節度使允讓知大宗正事仍詔自今於祖宗後各擇一人為之尚賢而不以齒糾正違失凡宗室奏陳先委詳酌而後聞不得專達其後又以宗室出居外州於西京置西外宗正司南京置南外宗正司矣今州縣義倉米始於仁宗時始集賢校理王琪嘗於景祐中陳請乞每正稅二斗别輸一升領於轉運使遇水旱振給有司㑹議不同而止慶厯元年九月琪申前議上特詔行之至新法行又増作每一斗收一升然水旱振給所賴為多行之日乆官吏視為公家之物遇振給靳惜特甚殊失元立法之意仁宗重臺諫之選景祐元年四月癸丑詔御史臺置殿中侍御史監察御史裏行又詔舉三丞以上嘗厯知縣人除御史裏行二年除御史又二年除三司開封判官自清要而厯繁劇選任既重一時號稱得人明道元年七月辛夘又以諫官無治所乃以門下省充諫院而别創門下省於右掖門之西盖朝臣皆有入局之所獨諫院無之故也真宗欲以太宗配天於南郊而太祖之配不可改乃奉太宗並配仁宗郊天又益以真宗則是以三帝配一上帝矣嘉祐七年因楊畋力諫乃定以太宗配今南郊又以祖宗並配矣祖宗重堂後官更用士人其叙遷至員外郎者與外任其後多不願出惟求子孫恩澤遂以為例英宗嘉祐八年中書奏今後願留人雖許供職其諸房提㸃並須擇才候職事脩舉方補如不職與堂除知州盖猶以士流之故優之也新法既行増置宰屬而士流不復為堂後官因是朘削舊制堂後官外任止於通判不得為知州先是皇祐三年四月詔堂後官無得佩魚若士人選用而至提㸃五房方許佩魚以示别也今雖非士人選用皆佩之矣先聖後嗣自先聖封文宣王而襲爵者稱文宣公文宣諡號也諡號非子孫所可襲仁宗至和二年三月用太常博士祖無擇議改為衍聖公盖取襲封之義舊制婦人冠以漆紗為之而加以飾金銀珠翠采色裝花初無定制仁宗時宫中以白角改造冠并梳冠之長至三尺有等肩者梳至一尺議者以為妖仁宗亦惡其侈皇祐元年十月詔禁中外不得以角為冠梳冠廣不得過一尺長不得過四寸梳長不得過四寸終仁宗之世無敢犯者其後侈靡之風盛行冠不特白角又易以魚魫梳不特白角又易以象牙玳瑁矣國朝武臣正任十年一遷官熈寜八年特詔駙馬都尉七年一遷官仍著於令非獨示優亦所以杜其非理干請也元豐六年二月癸未詔吏部七年磨勘更不取㫖仁宗景祐元年四月癸酉詔以河南府學為西京國子監置分司官其後南京北京皆援為之崇寜四年秋七月丙午朔詔罷三京國子監官各置司業一員其眂京具體而微矣皇朝追襃先賢皆有所因仁宗景祐元年九月詔封扁鵲為神應侯以上疾愈醫者許希有請也徽宗崇寜元年二月封孔鯉泗水侯孔伋沂水侯崇先聖之嗣也六月封伯夷為清恵侯叔齊為仁恵侯重節義之風也宣和元年五月甲申封列禦寇沖虚觀妙真君莊周微妙𤣥通真君尚虚無之教也然仁宗因醫者之請姑勉從之伯魚子思之封以配享從例封也伯夷叔齊遜干乗之國豈求身後虚名莊列物外人何羡真君之號不必封可也京師試於禮部者皆禱於二相廟二相者子游子夏也子游為武城宰子夏聘列國不知何以得相之名也今行都試禮部者皆禱於皮場廟皮場即皮剥所也建中靖國元年六月傳聞皮場土地主瘍疾之不治者詔封為靈貺侯今廟在萬夀觀之晨華館館與貢院為鄰不知士人之禱始於何時館因何而置廟也王安石創宫觀以處新法之異議者非泛施之士大夫也其後朝臣以罪出者多差宫觀其初出令也則曰優老元豐元年二月辛亥詔年六十者聴注差宫觀以三十月為任無得過兩任其後不拘此令矣元豐初詔檢正官檢詳官各以四員為額亦同都事録事承㫖分房掌管其品秩尚卑政和更制品秩甚髙各置一員通掌諸房權任甚重而所以擢用者不同或出於人主親擢則宰執反憚之所請不敢不從出於宰臣進擬則人主反疑之因是品位不進近世目宰屬樞屬官為旋窩人不以為樂其人主親擢則又有跳出旋窩之號頗恃以自矜矣樞宻使拜罷與宰臣恩數等皇祐五年髙若訥為樞宻使罷政仁宗惡其奸邪特令舎人草詞罷以示貶黜其後皆以前宰臣為之皆帶平章事罷政宣麻如故而自執政拜使者罷政不復宣麻踵若訥故事也淮南轉運使舊有二員皆在楚州明道元年七月甲戌詔徙一員於廬州南渡以後廢江淮發運使而治楚州者移治真州治廬州者移治舒州其後又自舒州移治無為軍矣太廟齋郎後改為假將仕郎政和六年十一月詔假版官行於衰亂之世不可循用改假承事郎為通仕郎假承奉承務郎為登仕郎改舊通仕郎為從政郎舊登仕郎為脩職郎假將仕郎去假字見任合改人并帶假人但改正稱呼更不給告勑舊貼職止於直祕閣直龍圗閣右文殿脩撰三等政和六年九月手詔天下人才冨盛趨事赴功者衆不足以待多士可増置直徽猷閣直顯謨閣直寶文閣直天章閣祕閣脩撰集英殿脩撰凡九等中興以後又増敷文煥章華文寶謨寶章五等矣等級既多遷轉亦易非舊比也今判部判寺判監判院之稱乃官制未改以前實稱今加於實稱之上可謂重疊昔有判刑部判禮部判兵部判工部惟户吏二部無之盖以流内銓三司使易其名矣官名既正又加以判甚無謂也其他寺監亦然至於登聞檢鼓院進奏院舊稱判政和五年言者謂官制之改稱判者悉除去惟大宗正司以官尊者稱判其次為知若六院不可復言判也遂詔悉改為監今之右文殿脩撰舊為集賢殿脩撰政和六年四月奉御筆集賢殿舊無此名祕書省殿以右文殿為名可改為右文殿脩撰今之宣教郎即昔之宣徳郎政和四年九月詔宣徳郎與宣徳門名相犯可改為宣教郎見任人不别給告但改稱呼政和四年八月詔改端明殿學士為延康殿學士改樞宻直學士為述古殿學士恩數品秩並依舊中興以後端明復舊而述古與樞宻直皆廢矣大夫之稱亞於卿而即官上應列宿文臣以為階官宜也况其來自古初非創意立名故神宗正官名逺考古制以大夫郎易職事舊稱為寄禄官若武臣横行正副使之稱與承制崇班供奉侍禁奉職借職差使借差非名之不正也政和乃悉易以大夫郎之稱此豈被堅執銳馳驟弓馬者之所宜稱乎横行以十二階易十二階猶之可也正副使各十九階並以八階易之無乃䡖䙝名器之甚乎昔之超轉猶作九資則是副使四十五年可轉不過四資是減四十五年為十六年矣祖宗多為武臣等級責其邊功非有竒功殊勲無因超越故文臣正郎員郎各止於三轉而武臣正使副使必各九轉聖君宏模一旦壞於建議之臣使良法美意掃地無遺最甚者稱謂不顧義理所在若文武官名一依元豐之制則人無得而議矣紹聖二年三月監察御史常安民言乞考祖宗用人之制脩立權侍郎遷進法詔三省議之章惇因奏乞自起居郎舎人侍御史帶脩撰除者滿三年取㫖自七寺卿國子祭酒太常少卿祕書少監直龍圗閣除者滿二年取㫖除脩撰與外任職事脩舉者再留二年取㫖除正與外任除待制即才能為衆所推績效顯著朝廷特拔擢者不拘此令詔從之且天子侍從之臣非有才能績效而可冒居之乎信如其言殆如銓部注擬常調計資厯嵗月者之為也是時雖出此令卒莫能行章惇之意盖欲假此令以扼異已之人而不次超越者則曰人主特拔擢也豈不愚哉慶厯二年冨弼乞罷殿試止令尚書禮部奏名次第唱名盖以廷試惟用詩賦士子多僥倖故也王堯臣梁適皆狀元及第以為譏已正月辛巳方從弼之請癸未遽從堯臣適之請復舊制慶厯元年十一月郊祀赦文功臣不限品數賜私門立㦸文武臣僚許立家廟已賜門㦸給官地修建此循唐制也故有兄弟同居而各置門以列㦸者想是時必有立㦸之人特近代此制不舉無能舉舊事以言者若家廟則終不能行至皇祐二年十二月甲申朔復頒三品以上家廟之制從宋庠之請也然一時議者欲令立廟之子孫襲其封爵世降一等自國公而至封男凡五世而封爵之卑者僅一二世或又疑襲封公爵惟三恪先聖之後有之此制一行數世之後必多又子孫或初命卑官不應襲公侯之爵議終不決竟尼不行是不詳考前代之制也君子惜之國朝自真宗時法令寖寛臣僚或以恩澤及所轉官為子孫乞賜科名則召試而授之或乞親屬陞陟注超越差遣自小官即為通判知州其降官降差遣亦援此陳乞叙復大抵皆公卿大臣牽於人情而不可拒者積日累月不可數計慶厯四年正月丙戌詔並禁止不得陳乞今縣邑門樓皆曰勑書樓淳化二年六月癸未詔曰近降制勑決遣頗多或有釐革刑名申明制度多所散失無以講求論報踰期有傷和氣自今州府監縣應所受詔勑並蔵勑書樓咸著於籍受代批書印紙厯子違者論罪則是勑書樓州縣皆有之也今州郡不聞有勑書樓矣唐有王㑹圗皇朝亦有四夷述職圗大中祥符八年九月直史館張復上言乞纂朝貢諸國衣冠畫其形狀録其風俗以備史官廣記從之是時外夷來朝者惟有髙麗西夏注輦占城三佛齊而已不若唐之盛也國初進奏官循五季舊例假官至御史大夫諸國既平天下一統諸州各置進奏官専達京師多至百數混於皂𨽻不復齒於衣冠之列真宗大中祥符二年三月戊辰詔諸州進奏官十年以上補三班奉職每遇郊祀叙補五人迄今為例种放有别墅在終南山聚徒講學性嗜酒種秫自釀林泉之景頗為幽勝真宗聞之欲幸其家而不果咸平六年遣使畫圗以進六月已未召輔臣觀於龍圗閣再三襃美放父翊嘗為吏部令史出官為長安簿放幼好學長以古道自任奉母隠居於終南山之豹林谷自稱退士作退士説數千字又號雲溪醉叟太宗朝屢召不起張齊賢薦其節行可厲風俗真宗復遣中使召之起為左司諫諫議大夫給事中力請還山從祀東封拜工部侍郎終身不娶既卒朝廷録其姪世雍為同學究出身唐人重於避諱國初此風尚在劉温叟以父名岳終身不聴樂部曲避監臨家諱尤甚太宗雍熈二年六月辛丑詔内外臣僚三代名諱止可行於已州縣長吏不得出家諱新授官職有家諱者除三省御史臺五品文班四品武班三品以上許準勑上言餘不在改請之限然法令明載官稱犯髙曽祖父諱冒居者有罪則是與此詔相反也豈非此詔既行之後人無廉恥習以成風故又從而禁之耶民間訴水旱舊無限制或秋而訴夏旱或冬而訴秋旱往往於收割之後欺罔官吏無從覈實拒之則不可聽之則難信故太宗淳化二年正月丁酉詔荆湖江淮二浙四川嶺南管内州縣訴水旱夏以四月三十日秋以八月三十日為限自此遂為定制國初州郡官屬皆長吏自行奏辟姓名未聞於朝已先莅職洎至命下則已莅月日皆為考任大抵皆其宗族親戚也太宗雍熈四年八月乙未詔曰諸處奏薦多是親黨既傷公道徒啓倖門今後如有員闕處當以狀聞自後奏辟不敢私於親戚或犯此令者人得而指擿之稍知所畏忌矣唐制乗驛者給銀牌五代庶事草剏但樞宻院給牒太平興國三年李飛雄偽作牒乗驛謀反禽捕伏誅六月戊午詔復舊制應乗驛者並給銀牌中興以後此制不復講矣燕翼詒謀録卷四
